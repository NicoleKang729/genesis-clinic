<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!--
  查看初日醫師團隊 按鈕（不跳轉頁版本）
  按鈕在原地展開下拉面板：選院所 → 選醫師 → 開新分頁到對應醫師的報名頁錨點。

  這個檔案本身要放到你的 GitHub Pages，再用 iframe 嵌進 FeverSocial：

  <iframe src="你放這個檔案的網址"
          style="border:none;width:100%;max-width:400px;height:480px;"
          scrolling="no"></iframe>

  用 iframe 是必要的：FeverSocial「原始碼」欄位本身會把 <style>／<script> 濾掉，
  也會讓中文編碼跑掉；而 iframe 載入的是獨立的 .html 檔案，
  瀏覽器會照這個檔案自己宣告的 UTF-8 顯示，不會亂碼。

  高度 480px 是抓最長的台北院所（8位醫師）清單估出來的，
  面板收合時按鈕維持在正中央，展開時面板置中往下長出來，
  清單超過高度會自動內部捲動，不會撐爆。
-->
<style>
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
    text-align:center;
    padding-top:40px;
  }

  .widget{
    position:relative;
    display:inline-block;
  }

  .pill-btn{
    display:inline-flex;
    align-items:center;
    gap:10px;
    background:#FEE9D8;
    color:#F37934;
    border:none;
    padding:14px 26px;
    border-radius:12px;
    font-size:19px;
    font-weight:700;
    cursor:pointer;
    transition:background .15s ease, transform .15s ease;
  }
  .pill-btn:hover{background:#fddcb8;transform:translateY(-1px);}
  .pill-btn svg{width:22px;height:22px;stroke:#F37934;flex:0 0 auto;}

  /* 錨定下拉面板：從按鈕下方展開，寬高固定、內部可捲動 */
  .panel{
    display:none;
    position:absolute;
    top:calc(100% + 8px);
    left:50%;
    transform:translateX(-50%);
    width:340px;
    max-width:90vw;
    background:#fff;
    border-radius:16px;
    box-shadow:0 12px 32px rgba(0,0,0,.18);
    padding:20px 18px;
    z-index:10;
  }
  .panel.show{display:block;}

  .panel-close{
    position:absolute;top:12px;right:12px;
    background:none;border:none;
    font-size:20px;color:#8a8a8a;
    cursor:pointer;
    line-height:1;
  }
  .panel h3{margin:0 0 4px;color:#F37934;font-size:20px;text-align:center;}
  .panel .sub{color:#8a8a8a;font-size:13px;margin-bottom:14px;text-align:center;}

  .back-btn{
    background:none;
    border:none;
    color:#8a8a8a;
    font-size:14px;
    margin-bottom:10px;
    cursor:pointer;
    padding:0;
  }
  .back-btn:hover{color:#F37934;}

  /* 橫向排列的正方形選項格：分院/醫師都用同一種格子 */
  .option-list{
    display:flex;
    flex-flow:row wrap;
    justify-content:center;
    gap:10px;
    max-height:300px;
    overflow-y:auto;
    padding:2px;
  }
  .option-btn{
    background:#FEE9D8;
    color:#F37934;
    border:none;
    width:92px;
    height:92px;
    border-radius:14px;
    font-size:14px;
    font-weight:700;
    line-height:1.3;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    cursor:pointer;
    transition:background .15s ease, transform .15s ease;
    flex:0 0 auto;
    font-family:inherit;
  }
  .option-btn:hover{background:#fddcb8;transform:translateY(-1px);}
</style>
</head>
<body>

<div class="widget" id="widget">
  <button class="pill-btn" id="openTeamSearch">
    查看初日醫師團隊
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </button>

  <div class="panel" id="panel">
    <button class="panel-close" id="panelClose">&#10005;</button>

    <div id="stepClinic">
      <h3>初日醫師團隊查詢</h3>
      <div class="sub">請選擇院所</div>
      <div class="option-list" id="clinicList"></div>
    </div>

    <div id="stepDoctor" style="display:none;">
      <button class="back-btn" id="backToClinic">&lsaquo; 返回院所選擇</button>
      <h3 id="clinicTitle"></h3>
      <div class="sub">請選擇醫師</div>
      <div class="option-list" id="doctorList"></div>
    </div>
  </div>
</div>

<script>
(function(){
  const clinics = {
    taipei:   { name:'台北初日', doctors:['宋晏仁醫師','鄧雯心醫師','魏士航醫師','李唐越醫師','周建安醫師','許芷瑜醫師','陳威龍醫師','王律婷醫師'] },
    hsinchu:  { name:'新竹初日', doctors:['魏士航醫師','王律婷醫師','楊德仁醫師'] },
    kaohsiung:{ name:'高雄初日', doctors:['李唐越醫師','李思賢醫師','范亞萱醫師','劉曜增醫師'] }
  };

  // 每位醫師對應到報名頁面上的名牌錨點
  const doctorLinks = {
    '宋晏仁醫師': 'https://events.cofit.me/genesis-16369#SD',
    '鄧雯心醫師': 'https://events.cofit.me/genesis-16369#SD',
    '李唐越醫師': 'https://events.cofit.me/genesis-16369#LW',
    '魏士航醫師': 'https://events.cofit.me/genesis-16369#LW',
    '周建安醫師': 'https://events.cofit.me/genesis-16369#CH',
    '許芷瑜醫師': 'https://events.cofit.me/genesis-16369#CH',
    '李思賢醫師': 'https://events.cofit.me/genesis-16369#LC',
    '陳威龍醫師': 'https://events.cofit.me/genesis-16369#LC',
    '劉曜增醫師': 'https://events.cofit.me/genesis-16369#LiuW',
    '王律婷醫師': 'https://events.cofit.me/genesis-16369#LiuW',
    '范亞萱醫師': 'https://events.cofit.me/genesis-16369#FY',
    '楊德仁醫師': 'https://events.cofit.me/genesis-16369#FY'
  };

  const widget = document.getElementById('widget');
  const panel = document.getElementById('panel');
  const stepClinic = document.getElementById('stepClinic');
  const stepDoctor = document.getElementById('stepDoctor');
  const clinicList = document.getElementById('clinicList');
  const doctorList = document.getElementById('doctorList');
  const clinicTitle = document.getElementById('clinicTitle');

  document.getElementById('openTeamSearch').addEventListener('click', (e)=>{
    e.stopPropagation();
    panel.classList.toggle('show');
    if(panel.classList.contains('show')) showClinicStep();
  });
  document.getElementById('panelClose').addEventListener('click', closePanel);
  document.getElementById('backToClinic').addEventListener('click', showClinicStep);

  document.addEventListener('click', (e)=>{
    if(!widget.contains(e.target)) closePanel();
  });
  panel.addEventListener('click', (e)=> e.stopPropagation());

  function closePanel(){ panel.classList.remove('show'); }

  function showClinicStep(){
    stepDoctor.style.display='none';
    stepClinic.style.display='block';
    clinicList.innerHTML='';
    Object.entries(clinics).forEach(([id,c])=>{
      const btn = document.createElement('button');
      btn.className='option-btn';
      btn.textContent=c.name;
      btn.addEventListener('click', ()=>showDoctorStep(id));
      clinicList.appendChild(btn);
    });
  }

  function showDoctorStep(clinicId){
    const c = clinics[clinicId];
    stepClinic.style.display='none';
    stepDoctor.style.display='block';
    clinicTitle.textContent = c.name;
    doctorList.innerHTML='';
    c.doctors.forEach(name=>{
      const btn = document.createElement('button');
      btn.className='option-btn';
      btn.textContent=name;
      btn.addEventListener('click', ()=>jumpToDoctor(name));
      doctorList.appendChild(btn);
    });
  }

  function jumpToDoctor(name){
    closePanel();
    const link = doctorLinks[name];
    if(link) window.open(link, '_blank');
  }
})();
</script>

</body>
</html>
