<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans TC',sans-serif;background:#FEF6F0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px}
  .wrap{display:flex;align-items:center;gap:48px;width:100%;max-width:1200px}
  .figures{position:relative;flex:0 0 auto;display:inline-block}
  .figures img{display:block;height:500px;width:auto}
  .dot{position:absolute;cursor:pointer;transform:translate(-50%,-50%);z-index:10;width:32px;height:32px;background:none;border:none;padding:0}
  .dot-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;width:32px;height:32px;opacity:.22;transition:all .3s}
  .dot-core{width:14px;height:14px;border-radius:50%;border:2.5px solid rgba(255,255,255,.9);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:transform .2s}
  .dot:hover .dot-ring,.dot.active .dot-ring{opacity:.5;transform:translate(-50%,-50%) scale(1.5)}
  .dot:hover .dot-core{transform:translate(-50%,-50%) scale(1.15)}
  .hl{position:absolute;border-radius:50%;pointer-events:none;opacity:0;transition:opacity .35s;z-index:4}
  .card{flex:1;background:white;border-radius:20px;padding:36px 40px;box-shadow:0 8px 40px rgba(200,140,100,.12);min-height:380px;display:flex;flex-direction:column;justify-content:center}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:4px 14px;border-radius:20px;margin-bottom:14px;letter-spacing:.05em}
  .main-title{font-size:32px;font-weight:700;color:#1a1a1a;margin-bottom:4px}
  .sub-desc{font-size:13px;color:#aaa;margin-bottom:14px}
  .bar{width:36px;height:3px;border-radius:2px;margin-bottom:16px}
  .sig-head{font-size:11px;letter-spacing:.1em;font-weight:700;margin-bottom:8px}
  .sig-list{list-style:none;margin-bottom:24px}
  .sig-list li{font-size:13.5px;color:#555;padding:7px 0 7px 16px;position:relative;border-bottom:1px solid #faf6f3;line-height:1.5}
  .sig-list li:last-child{border-bottom:none}
  .sig-list li::before{content:"▶";position:absolute;left:0;font-size:9px;top:10px}
  .cta{font-size:14px;font-weight:600;padding:14px 28px;border-radius:12px;border:2px solid;cursor:pointer;background:transparent;transition:all .2s;font-family:inherit}

  @media (max-width: 768px) {
    body{padding:16px;align-items:flex-start}
    .wrap{flex-direction:column;gap:20px;align-items:center}
    .figures img{height:auto;width:100%}
    .card{padding:24px;min-height:unset;width:100%}
    .main-title{font-size:26px}
    .cta{width:100%;text-align:center}
  }

  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
  .modal-backdrop.show{opacity:1;pointer-events:all}
  .modal-box{background:white;border-radius:20px;padding:36px 32px;width:90%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.15);transform:translateY(16px);transition:transform .25s;position:relative}
  .modal-backdrop.show .modal-box{transform:translateY(0)}
  .modal-title{font-size:18px;font-weight:700;color:#C85A1A;margin-bottom:4px}
  .modal-sub{font-size:13px;color:#E8A07A;margin-bottom:24px}
  .clinic-btn{display:block;width:100%;padding:16px 20px;border-radius:12px;border:1.5px solid #E8A07A;background:white;font-size:15px;font-weight:600;color:#C85A1A;cursor:pointer;margin-bottom:10px;text-align:left;transition:all .2s;font-family:inherit}
  .clinic-btn:last-of-type{margin-bottom:0}
  .clinic-btn .city{font-size:12px;font-weight:400;color:#E8A07A;display:block;margin-top:2px}
  .clinic-btn:hover{background:#E8793A;color:white;border-color:#E8793A}.clinic-btn:hover .city{color:rgba(255,255,255,.75)}
  .modal-close{position:absolute;top:14px;right:18px;background:none;border:none;font-size:22px;color:#bbb;cursor:pointer;line-height:1;padding:0}
</style>
</head>

}

function show(key,btn){
  document.querySelectorAll('.dot').forEach(d=>d.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.hl').forEach(h=>{h.style.opacity=h.dataset.key===key?'0.28':'0';});
  const t=T[key];
  document.getElementById('card').innerHTML=`
    <span class="pill" style="background:${t.color}18;color:${t.color}">${t.tag} 肥胖</span>
    <div class="main-title">${t.title}</div>
    <div class="sub-desc">${t.desc}</div>
    <div class="bar" style="background:${t.color}"></div>
    <div class="sig-head" style="color:${t.color}">常見徵兆</div>
    <ul class="sig-list">${t.signals.map(s=>`<li><span style="position:absolute;left:0;font-size:9px;top:10px;color:${t.color}">▶</span>${s}</li>`).join('')}</ul>
    <button class="cta" style="color:${t.color};border-color:${t.color}"
      onmouseenter="this.style.background='${t.color}';this.style.color='white'"
      onmouseleave="this.style.background='transparent';this.style.color='${t.color}'" onclick="openModal()">
      我可能是 ${t.tag}，我要預約初診！
    </button>`;
}

const img=document.getElementById('bodyImg');
if(img.complete&&img.naturalWidth) init();
else img.addEventListener('load',init);
window.addEventListener('load',function(){init();setTimeout(function(){var firstDot=document.querySelector('.dot');if(firstDot)firstDot.click();},100);});
window.addEventListener('resize',function(){init();setTimeout(function(){var a=document.querySelector('.dot.active');if(a)a.click();},50);});

function openModal(){
  document.getElementById('modalBackdrop').classList.add('show');
}
function closeModal(){
  document.getElementById('modalBackdrop').classList.remove('show');
}
window.addEventListener('load',function(){
  var bd=document.getElementById('modalBackdrop');
  if(bd) bd.addEventListener('click',function(e){if(e.target===this) closeModal();});
});
</script>
