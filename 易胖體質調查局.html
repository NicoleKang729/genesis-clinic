<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>易胖體質調查局｜初日診所</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

  :root {
    --orange: #F97316;
    --orange-light: #FED7AA;
    --orange-pale: #FFF7ED;
    --brown: #92400E;
    --cream: #FFFBF5;
    --gray: #6B7280;
    --dark: #1C1917;
    --card-radius: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
  }

  /* ── SCREENS ── */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ── INTRO SCREEN ── */
  #screen-intro {
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    background: linear-gradient(160deg, #FFF7ED 0%, #FFEDD5 60%, #FED7AA 100%);
    text-align: center;
  }

  .logo-badge {
    background: white;
    border-radius: 12px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 700;
    color: var(--orange);
    letter-spacing: 1px;
    margin-bottom: 28px;
    display: inline-block;
    box-shadow: 0 2px 8px rgba(249,115,22,0.15);
  }

  .intro-emoji {
    font-size: 80px;
    margin-bottom: 16px;
    animation: bounce 2s infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .intro-title {
    font-size: 36px;
    font-weight: 900;
    color: var(--orange);
    line-height: 1.2;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .intro-sub {
    font-size: 18px;
    font-weight: 700;
    color: var(--brown);
    margin-bottom: 20px;
  }

  .intro-desc {
    font-size: 15px;
    color: var(--gray);
    line-height: 1.7;
    max-width: 320px;
    margin: 0 auto 36px;
  }

  .btn-start {
    background: var(--orange);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 16px 48px;
    font-size: 18px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(249,115,22,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .btn-start:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(249,115,22,0.4);
  }

  .btn-start:active { transform: translateY(0); }

  /* ── QUIZ SCREEN ── */
  #screen-quiz {
    background: var(--cream);
  }

  .quiz-header {
    background: white;
    padding: 20px 24px 16px;
    border-bottom: 1px solid #F3E8D8;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .quiz-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--orange);
    letter-spacing: 1.5px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .progress-bar-wrap {
    background: #F3E8D8;
    border-radius: 99px;
    height: 8px;
    overflow: hidden;
  }

  .progress-bar-fill {
    background: linear-gradient(90deg, var(--orange), #FB923C);
    height: 100%;
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }

  .quiz-body {
    flex: 1;
    padding: 32px 24px 24px;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
  }

  .question-num {
    font-size: 13px;
    font-weight: 700;
    color: var(--orange);
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .question-text {
    font-size: 22px;
    font-weight: 900;
    line-height: 1.4;
    color: var(--dark);
    margin-bottom: 32px;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
  }

  .option-btn {
    background: white;
    border: 2px solid #F3E8D8;
    border-radius: var(--card-radius);
    padding: 18px 20px;
    font-size: 16px;
    font-weight: 500;
    font-family: inherit;
    color: var(--dark);
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    line-height: 1.4;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }

  .option-btn:hover {
    border-color: var(--orange);
    background: var(--orange-pale);
    transform: translateX(4px);
  }

  .option-btn.selected {
    border-color: var(--orange);
    background: var(--orange-pale);
    color: var(--brown);
    font-weight: 700;
  }

  .option-icon {
    display: inline-block;
    width: 28px;
    height: 28px;
    background: var(--orange-light);
    border-radius: 50%;
    text-align: center;
    line-height: 28px;
    font-size: 13px;
    font-weight: 700;
    color: var(--brown);
    margin-right: 10px;
    vertical-align: middle;
    flex-shrink: 0;
  }

  /* ── RESULT SCREEN ── */
  #screen-result {
    background: linear-gradient(160deg, #FFF7ED 0%, #FFEDD5 60%, #FED7AA 100%);
    align-items: center;
    padding: 40px 24px 48px;
    text-align: center;
  }

  .result-eyebrow {
    font-size: 13px;
    font-weight: 700;
    color: var(--orange);
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  .result-animal {
    font-size: 96px;
    margin-bottom: 8px;
    animation: pop 0.5s cubic-bezier(.17,.67,.47,1.3) both;
  }

  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .result-type-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--brown);
    background: var(--orange-light);
    border-radius: 99px;
    padding: 4px 16px;
    display: inline-block;
    margin-bottom: 12px;
  }

  .result-name {
    font-size: 40px;
    font-weight: 900;
    color: var(--orange);
    margin-bottom: 6px;
    letter-spacing: -1px;
  }

  .result-tagline {
    font-size: 16px;
    font-weight: 700;
    color: var(--brown);
    margin-bottom: 28px;
  }

  .result-card {
    background: white;
    border-radius: var(--card-radius);
    padding: 24px;
    max-width: 380px;
    width: 100%;
    text-align: left;
    box-shadow: 0 8px 32px rgba(249,115,22,0.12);
    margin-bottom: 16px;
  }

  .result-card h3 {
    font-size: 14px;
    font-weight: 700;
    color: var(--orange);
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .result-card p {
    font-size: 15px;
    color: var(--dark);
    line-height: 1.75;
  }

  .result-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .tag {
    background: white;
    border: 1.5px solid var(--orange-light);
    border-radius: 99px;
    padding: 4px 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--brown);
  }

  .btn-retry {
    background: white;
    color: var(--orange);
    border: 2px solid var(--orange);
    border-radius: 50px;
    padding: 14px 40px;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    margin-top: 8px;
  }

  .btn-retry:hover {
    background: var(--orange);
    color: white;
  }

  .clinic-footer {
    margin-top: 32px;
    font-size: 13px;
    color: var(--gray);
  }

  .clinic-footer strong {
    color: var(--brown);
  }

  @media (max-width: 400px) {
    .intro-title { font-size: 30px; }
    .question-text { font-size: 19px; }
    .result-name { font-size: 32px; }
  }
</style>
</head>
<body>

<!-- ══ INTRO ══ -->
<div id="screen-intro" class="screen active">
  <div class="logo-badge">G 初日診所</div>
  <div class="intro-emoji">🔍</div>
  <div class="intro-title">易胖體質<br>調查局</div>
  <div class="intro-sub">一分鐘測出你的易胖小怪獸</div>
  <p class="intro-desc">瘦不了都是易胖體質惹的禍？<br>快來測出藏在你身體裡的易胖小怪獸！</p>
  <button class="btn-start" onclick="startQuiz()">立即開始 →</button>
</div>

<!-- ══ QUIZ ══ -->
<div id="screen-quiz" class="screen">
  <div class="quiz-header">
    <div class="quiz-label">易胖體質調查局</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>
  <div class="quiz-body">
    <div class="question-num" id="q-num"></div>
    <div class="question-text" id="q-text"></div>
    <div class="options-list" id="q-options"></div>
  </div>
</div>

<!-- ══ RESULT ══ -->
<div id="screen-result" class="screen">
  <div class="result-eyebrow">你的易胖小怪獸是</div>
  <div class="result-animal" id="r-animal"></div>
  <div class="result-type-label" id="r-label"></div>
  <div class="result-name" id="r-name"></div>
  <div class="result-tags" id="r-tags"></div>
  <div class="result-card">
    <h3>你的易胖特徵</h3>
    <p id="r-desc"></p>
  </div>
  <div class="result-card">
    <h3>醫師建議</h3>
    <p id="r-advice"></p>
  </div>
  <button class="btn-retry" onclick="resetQuiz()">再測一次</button>
  <div class="clinic-footer">由 <strong>初日診所</strong> 提供 · 專業體重管理</div>
</div>

<script>
const questions = [
  {
    text: '加班到深夜，你會選擇什麼宵夜？',
    options: [
      { label: '當然炸物，還用說嗎？', score: 'A' },
      { label: '給我甜點，紓壓首選！', score: 'B' },
      { label: '跳過，只想趕快完回家啦！', score: 'C' },
    ]
  },
  {
    text: '早上起床第一件事情是？',
    options: [
      { label: '早餐要吃什麼呢～', score: 'A' },
      { label: '先看手機累積多少訊息', score: 'B' },
      { label: '別吵我，當然是先賴床！', score: 'C' },
    ]
  },
  {
    text: '週末時，有一個家庭聚餐，但充滿高油高糖的料理，你會？',
    options: [
      { label: '盡情享用，週末就是要放縱', score: 'A' },
      { label: '內疚焦慮，但還是照吃不誤', score: 'B' },
      { label: '我是飲控高手，淺嚐即止', score: 'C' },
    ]
  },
  {
    text: '選一種你最想擁有的超能力？',
    options: [
      { label: '點什麼食物都不會變胖', score: 'A' },
      { label: '時間暫停，隨時都能喘口氣', score: 'B' },
      { label: '調節天氣，讓我舒適地球也舒適', score: 'C' },
    ]
  },
];

const results = {
  A: {
    animal: '🐆',
    label: '脂肪囤積型',
    name: '脂肪獵豹',
    tagline: '#脂肪囤積 #注意熱量 #吃對很重要',
    tags: ['#脂肪囤積', '#注意熱量', '#吃對很重要'],
    desc: '胰島素是一種荷爾蒙，負責透過細胞內的葡萄糖進行代謝。全身體針對胰島素的反應越強越敏感，使脂肪容易囤積在腹部，想要控制體重就應試圖從飲食限制做起，跟脂肪獵豹一樣跑！',
    advice: '更好看加強胰島素抵抗的程度，可以試試藉助於飲食方面之外，控制醣分攝取，選擇低GI食物，來降低胰島素阻力。'
  },
  B: {
    animal: '🐰',
    label: '壓力肥胖型',
    name: '緊張兔子',
    tagline: '#緊張壓力 #情緒肥胖 #壓力管理',
    tags: ['#緊張壓力', '#情緒肥胖', '#壓力管理'],
    desc: '容易因壓力過大而放鬆飲食，因而產生會肥胖大肚、糖類飲食等等問題。身體腎上腺素大量分泌，都能從事舒壓放鬆的方式，小心不要不知不覺中陷入肥胖陷阱！',
    advice: '你需要好好療癒一下，嘗試自己可以以吃以外找到的方式進行放鬆，繼續不要過度著急，才是趕跑怪獸的最好辦法。'
  },
  C: {
    animal: '🐼',
    label: '代謝低下型',
    name: '慵懶熊貓',
    tagline: '#龜速代謝 #怎麼動都不起勁 #真的好累',
    tags: ['#龜速代謝', '#怎麼動都不起勁', '#真的好累'],
    desc: '甲狀腺功能代表新陳代謝，若能低於代謝緩慢，往往表現為怕冷、消化不良、皮膚乾燥、睡眠品質差等症狀。緩慢的新陳代謝體質，容易導致脂肪囤積，造成體重上升。',
    advice: '適度運動，如散步慢跑健走，調整身體節奏，並注意均衡飲食，多吃溫潤蔬菜和水果，如果長時間感覺疲憊、反應遲緩，這是要趕快尋求專業醫師的問題！'
  },
  R: {
    animal: '🐒',
    label: '美食追求型',
    name: '美食狂猿',
    tagline: '#管不住嘴 #美食控 #我吃故我在',
    tags: ['#管不住嘴', '#美食控', '#我吃故我在'],
    desc: '擁有對美食的強烈渴望，經常追求各種美味佳餚，傾向於多吃少動，尤其偏好高油高糖加工食品。享受美食的當下，會在潛意識與罪惡感的心態拉扯。',
    advice: '可以嘗試實踐「聰明飲食」，並用水肉蔬果量的飲食，重要計算食物、控制熱量攝取，另外，多種類身體餐點吃出的吃體驗，不要常換「第二袋」囉！'
  }
};

let scores = { A: 0, B: 0, C: 0 };
let current = 0;

function startQuiz() {
  showScreen('screen-quiz');
  showQuestion();
}

function showQuestion() {
  const q = questions[current];
  const total = questions.length;
  document.getElementById('q-num').textContent = `第 ${current + 1} 題 / 共 ${total} 題`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('progress-fill').style.width = `${(current / total) * 100}%`;

  const optionsEl = document.getElementById('q-options');
  optionsEl.innerHTML = '';
  const letters = ['A', 'B', 'C'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-icon">${letters[i]}</span>${opt.label}`;
    btn.onclick = () => selectOption(opt.score, btn);
    optionsEl.appendChild(btn);
  });
}

function selectOption(scoreKey, btn) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  scores[scoreKey]++;

  setTimeout(() => {
    current++;
    if (current < questions.length) {
      showQuestion();
    } else {
      showResult();
    }
  }, 350);
}

function showResult() {
  document.getElementById('progress-fill').style.width = '100%';

  let resultKey;
  const A = scores.A, B = scores.B, C = scores.C;

  if (A > 2) resultKey = 'A';
  else if (B > 2) resultKey = 'B';
  else if (C > 2) resultKey = 'C';
  else if (A === 2 && B === 1 && C === 1) resultKey = 'A';
  else if (B === 2 && A === 1 && C === 1) resultKey = 'B';
  else if (C === 2 && A === 1 && B === 1) resultKey = 'C';
  else {
    // 完全平手 → 隨機四種各25%
    const pool = ['A', 'B', 'C', 'R'];
    resultKey = pool[Math.floor(Math.random() * 4)];
  }

  const r = results[resultKey];
  document.getElementById('r-animal').textContent = r.animal;
  document.getElementById('r-label').textContent = r.label;
  document.getElementById('r-name').textContent = r.name;
  document.getElementById('r-desc').textContent = r.desc;
  document.getElementById('r-advice').textContent = r.advice;

  const tagsEl = document.getElementById('r-tags');
  tagsEl.innerHTML = '';
  r.tags.forEach(t => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = t;
    tagsEl.appendChild(span);
  });

  showScreen('screen-result');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function resetQuiz() {
  scores = { A: 0, B: 0, C: 0 };
  current = 0;
  showScreen('screen-intro');
}
</script>
</body>
</html>
